domains:
    - tubecast
php_version: "8.5"
framework: tempest
framework_version: "3"
framework_def:
    name: tempest
    label: Tempest
    version: "3"
    php:
        min: "8.5"
        max: "8.5"
    detect:
        - composer: tempest/framework
        - file: tempest
    public_dir: public
    env:
        file: .env
        example_file: .env.example
        format: dotenv
        url_key: BASE_URI
        services:
            mailpit:
                detect:
                    - key: MAIL_SMTP_HOST
                vars:
                    - MAIL_SMTP_SCHEME=smtp
                    - MAIL_SMTP_HOST=lerd-mailpit
                    - MAIL_SMTP_PORT=1025
            mysql:
                detect:
                    - key: DB_HOST
                vars:
                    - DB_HOST=lerd-mysql
                    - DB_PORT=3306
                    - DB_DATABASE={{site}}
                    - DB_USERNAME=root
                    - DB_PASSWORD=lerd
            postgres:
                detect:
                    - key: DB_HOST
                vars:
                    - DB_HOST=lerd-postgres
                    - DB_PORT=5432
                    - DB_DATABASE={{site}}
                    - DB_USERNAME=postgres
                    - DB_PASSWORD=lerd
        key_generation:
            env_key: SIGNING_KEY
            command: php tempest key:generate
    composer: auto
    npm: auto
    workers:
        command_bus:
            label: Async Command Monitor
            command: php tempest command:monitor
            restart: always
            check:
                composer: tempest/command-bus
        schedule:
            label: Task Scheduler
            command: php tempest schedule:run
            schedule: minutely
        vite:
            label: Vite
            command: npm run dev
            restart: on-failure
            check:
                file: node_modules/vite
            host: true
            per_worktree: true
            replaces_build: true
    setup:
        - label: Generate discovery cache
          command: php tempest discovery:generate --no-interaction
          default: true
        - label: Run migrations
          command: php tempest migrate:up --force
          default: true
          check:
            composer: tempest/database
        - label: Initialize TubeCast
          command: php tempest tubecast:init
          default: true
    commands:
        - name: discovery:clear
          label: Clear discovery cache
          command: php tempest discovery:clear --no-interaction
          output: silent
          icon: broom
        - name: migrate
          label: Run migrations
          command: php tempest migrate:up --force
          output: silent
          icon: database
        - name: init
          label: Initialize TubeCast
          command: php tempest tubecast:init
          output: text
          icon: check
        - name: cache:clear
          label: Clear caches
          command: php tempest cache:clear --force
          output: silent
          icon: broom
    console: tempest
    create: composer create-project tempest/app
    logs:
        - path: .tempest/logs/*.log
          format: monolog
secured: true
services:
    - sqlite
workers:
  - schedule
  - vite
