# Podcast media via X-Accel-Redirect (see MediaController).
# ^~ prevents the static .m4a/.mp4 regex locations from hijacking internal redirects.
location ^~ /internal-media/ {
    internal;
    alias /data/podcast/;
    add_header Accept-Ranges bytes always;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
}

# Original downloads via X-Accel-Redirect (archive enclosure mode).
location ^~ /internal-downloads/ {
    internal;
    alias /data/downloads/;
    add_header Accept-Ranges bytes always;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
}
