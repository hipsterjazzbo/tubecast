services:
  tubecast:
    image: ghcr.io/hipsterjazzbo/tubecast:latest
    restart: unless-stopped
    ports:
      - "${TUBECAST_PORT:-8742}:8080"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      SERVER_NAME: ":8080"
      # TUBECAST_* vars are optional overrides (.env.docker); never read from lerd .env.
      PUID: ${TUBECAST_PUID:-33}
      PGID: ${TUBECAST_PGID:-33}
      ENVIRONMENT: production
      BASE_URI: ${TUBECAST_BASE_URI:-http://localhost:8742}
      ADMIN_USERNAME: ${TUBECAST_ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${TUBECAST_ADMIN_PASSWORD:-changeme}
      INTERNAL_CACHES: "true"
      DISCOVERY_CACHE: partial
      DEBUG_LOG_PATH: "null"
      SERVER_LOG_PATH: "null"
      DB_DATABASE: /config/database.sqlite
      DATA_PATH: /config
      DOWNLOADS_PATH: /media/downloads
      PODCAST_PATH: /media/podcast
      YT_DLP_BINARY: yt-dlp
      YT_DLP_WORKER_CONCURRENCY: "1"
      YT_DLP_SLEEP_INTERVAL: "5"
      YT_DLP_SLEEP_REQUESTS: "1"
      YT_DLP_LIMIT_RATE: ""
      YOUTUBE_API_KEY: ${TUBECAST_YOUTUBE_API_KEY:-}
    volumes:
      # Override with host paths via TUBECAST_CONFIG_DIR / TUBECAST_MEDIA_DIR in .env.docker
      - ${TUBECAST_CONFIG_DIR:-tubecast-config}:/config
      - ${TUBECAST_MEDIA_DIR:-tubecast-media}:/media

volumes:
  tubecast-config:
  tubecast-media:
